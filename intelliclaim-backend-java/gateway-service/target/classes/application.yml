server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: claim-service
          uri: lb://claim-service
          predicates:
            - Path=/api/v1/claims/**
        - id: forensics-service
          uri: lb://forensics-service
          predicates:
            - Path=/api/v1/forensics/**
        - id: identity-service
          uri: lb://identity-service
          predicates:
            - Path=/api/v1/auth/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
