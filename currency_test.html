<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Currency Formatting Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .test-container {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
        }
        .test-item {
            margin: 15px 0;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
        }
        .function-name {
            font-weight: bold;
            color: #FFD700;
        }
        .result {
            font-size: 1.2em;
            color: #90EE90;
            margin-top: 5px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .flag {
            font-size: 2em;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1><span class="flag">🇮🇳</span> Indian Currency Formatting Test</h1>
        
        <div class="test-item">
            <div class="function-name">formatIndianRupees(200000)</div>
            <div class="result" id="test1"></div>
        </div>
        
        <div class="test-item">
            <div class="function-name">formatIndianRupees(1200000)</div>
            <div class="result" id="test2"></div>
        </div>
        
        <div class="test-item">
            <div class="function-name">formatIndianRupees("$3000") - USD to INR conversion</div>
            <div class="result" id="test3"></div>
        </div>
        
        <div class="test-item">
            <div class="function-name">convertUSDToINR(100)</div>
            <div class="result" id="test4"></div>
        </div>
        
        <div class="test-item">
            <div class="function-name">formatIndianRupeesCompact(15000000)</div>
            <div class="result" id="test5"></div>
        </div>
        
        <div class="test-item">
            <div class="function-name">formatIndianRupees(256000) - Medical claim amount</div>
            <div class="result" id="test6"></div>
        </div>
    </div>

    <script>
        // Currency formatting utilities for Indian Rupees - inline for testing
        
        function formatIndianRupees(amount, showSymbol = true) {
            if (amount === null || amount === undefined || amount === '') {
                return 'N/A';
            }

            const numAmount = typeof amount === 'string' ? parseFloat(amount.replace(/[^\\d.-]/g, '')) : amount;
            
            if (isNaN(numAmount)) {
                return 'N/A';
            }

            // Format with Indian number system (commas in Indian positions)
            const formattedAmount = numAmount.toLocaleString('en-IN');
            
            return showSymbol ? `₹${formattedAmount}` : formattedAmount;
        }

        function formatIndianRupeesCompact(amount, showSymbol = true) {
            if (amount === null || amount === undefined || amount === '') {
                return 'N/A';
            }

            const numAmount = typeof amount === 'string' ? parseFloat(amount.replace(/[^\\d.-]/g, '')) : amount;
            
            if (isNaN(numAmount)) {
                return 'N/A';
            }

            let formattedAmount;
            
            if (numAmount >= 10000000) { // 1 Crore or more
                formattedAmount = (numAmount / 10000000).toFixed(1) + ' Cr';
            } else if (numAmount >= 100000) { // 1 Lakh or more
                formattedAmount = (numAmount / 100000).toFixed(1) + ' L';
            } else {
                formattedAmount = numAmount.toLocaleString('en-IN');
            }
            
            return showSymbol ? `₹${formattedAmount}` : formattedAmount;
        }

        function convertUSDToINR(usdAmount) {
            const numAmount = typeof usdAmount === 'string' ? parseFloat(usdAmount.replace(/[^\\d.-]/g, '')) : usdAmount;
            if (isNaN(numAmount)) return 0;
            
            return Math.round(numAmount * 83);
        }

        // Run tests
        document.getElementById('test1').textContent = formatIndianRupees(200000);
        document.getElementById('test2').textContent = formatIndianRupees(1200000);
        document.getElementById('test3').textContent = formatIndianRupees(convertUSDToINR(3000));
        document.getElementById('test4').textContent = convertUSDToINR(100);
        document.getElementById('test5').textContent = formatIndianRupeesCompact(15000000);
        document.getElementById('test6').textContent = formatIndianRupees(256000);
    </script>
</body>
</html>
