services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: intelliclaim_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - intelliclaim_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache and Message Broker
  redis:
    image: redis:7-alpine
    container_name: intelliclaim_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - intelliclaim_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intelliclaim_api
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://intelliclaim_user:gizHj5rx6aigiE-XeZu3uA@postgres:5432/intelliclaim
      
      # Redis
      REDIS_URL: redis://:p_SEKXs9ghjcsXCKLQPzpw@redis:6379/0
      
      # Application
      APP_NAME: IntelliClaim Vision API
      APP_VERSION: 1.0.0
      DEBUG: false
      
      # Security
      SECRET_KEY: B2br40_2XXrW1hl5AdDoY1njhgngsITKd1dClT8vgLA
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      
      # OpenAI
      OPENAI_API_KEY: your-openai-api-key
      
      # File Storage
      UPLOAD_DIR: /app/storage/uploads
      MODELS_DIR: /app/storage/models
      TEMP_DIR: /app/storage/temp
      EXPORTS_DIR: /app/storage/exports
      
      # Logging
      LOG_LEVEL: INFO
      
      # Celery
      CELERY_BROKER_URL: redis://:p_SEKXs9ghjcsXCKLQPzpw@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:p_SEKXs9ghjcsXCKLQPzpw@redis:6379/1
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - intelliclaim_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Worker for Background Tasks
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intelliclaim_celery_worker
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://intelliclaim_user:gizHj5rx6aigiE-XeZu3uA@postgres:5432/intelliclaim
      
      # Redis
      REDIS_URL: redis://:p_SEKXs9ghjcsXCKLQPzpw@redis:6379/0
      
      # Celery
      CELERY_BROKER_URL: redis://:p_SEKXs9ghjcsXCKLQPzpw@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:p_SEKXs9ghjcsXCKLQPzpw@redis:6379/1
      
      # Application
      SECRET_KEY: B2br40_2XXrW1hl5AdDoY1njhgngsITKd1dClT8vgLA
      
      # OpenAI
      OPENAI_API_KEY: your-openai-api-key
      
      # File Storage
      UPLOAD_DIR: /app/storage/uploads
      MODELS_DIR: /app/storage/models
      TEMP_DIR: /app/storage/temp
      EXPORTS_DIR: /app/storage/exports
      
      # Logging
      LOG_LEVEL: INFO
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - intelliclaim_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "app.core.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Flower - Celery Monitoring
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intelliclaim_flower
    command: celery -A app.core.celery_app flower --port=5555
    environment:
      CELERY_BROKER_URL: redis://:p_SEKXs9ghjcsXCKLQPzpw@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:p_SEKXs9ghjcsXCKLQPzpw@redis:6379/1
      FLOWER_BASIC_AUTH: admin:flower_admin_password
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - intelliclaim_network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: intelliclaim_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - intelliclaim_network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  intelliclaim_network:
    driver: bridge
