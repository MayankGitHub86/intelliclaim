<!-- Dashboard Analytics Overview -->
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg1)"/>
  
  <!-- Header -->
  <rect x="40" y="40" width="720" height="80" fill="#ffffff" rx="12" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1f2937">IntelliClaim Dashboard</text>
  <text x="60" y="95" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">Real-time Insurance Analytics</text>
  
  <!-- Stats Cards Row -->
  <rect x="40" y="140" width="170" height="120" fill="url(#card1)" rx="12" stroke="#0066FF" stroke-width="2"/>
  <text x="125" y="170" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0066FF" text-anchor="middle">47,823</text>
  <text x="125" y="190" font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">Claims Processed</text>
  <text x="125" y="240" font-family="Arial, sans-serif" font-size="14" fill="#00FF88" text-anchor="middle">↗ +12% today</text>
  
  <rect x="230" y="140" width="170" height="120" fill="#ffffff" rx="12" stroke="#e5e7eb"/>
  <text x="315" y="170" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#8B5CF6" text-anchor="middle">97.5%</text>
  <text x="315" y="190" font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">AI Accuracy</text>
  <text x="315" y="240" font-family="Arial, sans-serif" font-size="14" fill="#00FF88" text-anchor="middle">↗ +0.3%</text>
  
  <rect x="420" y="140" width="170" height="120" fill="#ffffff" rx="12" stroke="#e5e7eb"/>
  <text x="505" y="170" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#06B6D4" text-anchor="middle">2.8s</text>
  <text x="505" y="190" font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">Avg Processing</text>
  <text x="505" y="240" font-family="Arial, sans-serif" font-size="14" fill="#00FF88" text-anchor="middle">↗ -15%</text>
  
  <rect x="610" y="140" width="150" height="120" fill="#ffffff" rx="12" stroke="#e5e7eb"/>
  <text x="685" y="170" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#F59E0B" text-anchor="middle">₹2.4Cr</text>
  <text x="685" y="190" font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">Claims Value</text>
  <text x="685" y="240" font-family="Arial, sans-serif" font-size="14" fill="#00FF88" text-anchor="middle">↗ +8%</text>
  
  <!-- Chart Area -->
  <rect x="40" y="290" width="480" height="270" fill="#ffffff" rx="12" stroke="#e5e7eb"/>
  <text x="60" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#374151">Processing Volume (Last 7 Days)</text>
  
  <!-- Simple line chart -->
  <polyline points="70,450 120,420 170,380 220,360 270,340 320,320 370,310 420,300 470,290" 
            fill="none" stroke="#0066FF" stroke-width="3"/>
  <polyline points="70,480 120,470 170,450 220,430 270,420 320,400 370,390 420,380 470,370" 
            fill="none" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Recent Activity -->
  <rect x="540" y="290" width="220" height="270" fill="#ffffff" rx="12" stroke="#e5e7eb"/>
  <text x="560" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#374151">Recent Claims</text>
  
  <circle cx="570" cy="350" r="6" fill="#00FF88"/>
  <text x="585" y="355" font-family="Arial, sans-serif" font-size="12" fill="#374151">Auto Claim - Approved</text>
  <text x="710" y="355" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">₹2.5L</text>
  
  <circle cx="570" cy="380" r="6" fill="#F59E0B"/>
  <text x="585" y="385" font-family="Arial, sans-serif" font-size="12" fill="#374151">Health Claim - Review</text>
  <text x="710" y="385" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">₹80K</text>
  
  <circle cx="570" cy="410" r="6" fill="#00FF88"/>
  <text x="585" y="415" font-family="Arial, sans-serif" font-size="12" fill="#374151">Property - Approved</text>
  <text x="710" y="415" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">₹15L</text>
  
  <circle cx="570" cy="440" r="6" fill="#EF4444"/>
  <text x="585" y="445" font-family="Arial, sans-serif" font-size="12" fill="#374151">Fraud Alert - Rejected</text>
  <text x="710" y="445" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">₹5L</text>
</svg>
