<!-- Claims Overview Dashboard -->
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3e8ff;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e5e7eb" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg3)"/>
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.3"/>
  
  <!-- Header -->
  <rect x="40" y="40" width="720" height="80" fill="#ffffff" rx="12" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1f2937">Claims Management Hub</text>
  <text x="60" y="95" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">Real-time Claims Processing & Status</text>
  
  <!-- Status Indicators -->
  <circle cx="680" cy="60" r="8" fill="#00FF88"/>
  <text x="700" y="65" font-family="Arial, sans-serif" font-size="12" fill="#374151">Live</text>
  <circle cx="680" cy="85" r="8" fill="#0066FF"/>
  <text x="700" y="90" font-family="Arial, sans-serif" font-size="12" fill="#374151">Processing</text>
  <circle cx="680" cy="110" r="8" fill="#F59E0B"/>
  <text x="700" y="115" font-family="Arial, sans-serif" font-size="12" fill="#374151">Pending</text>
  
  <!-- Main Chart Area -->
  <rect x="60" y="150" width="680" height="250" fill="#ffffff" rx="12" stroke="#e5e7eb"/>
  <text x="80" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#374151">Monthly Claims Trend</text>
  
  <!-- Chart Bars -->
  <rect x="100" y="300" width="40" height="80" fill="#8B5CF6" rx="4"/>
  <text x="120" y="395" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Jan</text>
  
  <rect x="160" y="280" width="40" height="100" fill="#0066FF" rx="4"/>
  <text x="180" y="395" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Feb</text>
  
  <rect x="220" y="260" width="40" height="120" fill="#00FF88" rx="4"/>
  <text x="240" y="395" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Mar</text>
  
  <rect x="280" y="240" width="40" height="140" fill="#F59E0B" rx="4"/>
  <text x="300" y="395" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Apr</text>
  
  <rect x="340" y="220" width="40" height="160" fill="#EF4444" rx="4"/>
  <text x="360" y="395" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">May</text>
  
  <rect x="400" y="200" width="40" height="180" fill="#8B5CF6" rx="4"/>
  <text x="420" y="395" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Jun</text>
  
  <!-- Chart Values -->
  <text x="120" y="295" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">2.4k</text>
  <text x="180" y="275" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">3.1k</text>
  <text x="240" y="255" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">4.2k</text>
  <text x="300" y="235" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">5.1k</text>
  <text x="360" y="215" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">6.3k</text>
  <text x="420" y="195" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">7.8k</text>
  
  <!-- Side Stats Panel -->
  <rect x="500" y="200" width="220" height="180" fill="#f8fafc" rx="8" stroke="#e2e8f0"/>
  <text x="520" y="225" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Quick Stats</text>
  
  <text x="520" y="250" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0066FF">7,823</text>
  <text x="520" y="265" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Total Claims This Month</text>
  
  <text x="520" y="290" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#00FF88">6,341</text>
  <text x="520" y="305" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Approved Claims</text>
  
  <text x="520" y="330" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#F59E0B">892</text>
  <text x="520" y="345" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Under Review</text>
  
  <text x="520" y="370" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#EF4444">590</text>
  <text x="520" y="385" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Rejected Claims</text>
  
  <!-- Bottom Action Panel -->
  <rect x="60" y="430" width="680" height="120" fill="#ffffff" rx="12" stroke="#e5e7eb"/>
  <text x="80" y="460" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#374151">Recent Activity</text>
  
  <circle cx="100" cy="485" r="5" fill="#00FF88"/>
  <text x="120" y="490" font-family="Arial, sans-serif" font-size="12" fill="#374151">Policy holder John Doe submitted new auto claim - 5 mins ago</text>
  
  <circle cx="100" cy="510" r="5" fill="#0066FF"/>
  <text x="120" y="515" font-family="Arial, sans-serif" font-size="12" fill="#374151">AI completed analysis for claim CL-2024-005 - 12 mins ago</text>
  
  <circle cx="100" cy="535" r="5" fill="#F59E0B"/>
  <text x="120" y="540" font-family="Arial, sans-serif" font-size="12" fill="#374151">Claim CL-2024-003 requires manual review - 18 mins ago</text>
  
  <!-- Performance indicator -->
  <rect x="600" y="470" width="120" height="60" fill="#f0f9ff" rx="8" stroke="#0066FF" stroke-width="2"/>
  <text x="660" y="490" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0066FF" text-anchor="middle">97.2%</text>
  <text x="660" y="505" font-family="Arial, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Success Rate</text>
  <text x="660" y="520" font-family="Arial, sans-serif" font-size="8" fill="#6b7280" text-anchor="middle">Last 7 days</text>
</svg>
