<!-- AI Insights Dashboard -->
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="aiGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00FF88;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00FF88;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg2)"/>
  
  <!-- Header with AI Icon -->
  <rect x="40" y="40" width="720" height="80" fill="#ffffff" rx="12" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="80" cy="80" r="20" fill="url(#aiGlow)"/>
  <text x="80" y="85" font-family="Arial, sans-serif" font-size="16" fill="#00FF88" text-anchor="middle">🧠</text>
  <text x="120" y="70" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1f2937">AI Smart Prediction System</text>
  <text x="120" y="95" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">Machine Learning Insights & Predictions</text>
  
  <!-- AI Performance Circle -->
  <circle cx="400" cy="300" r="80" fill="#ffffff" stroke="#00FF88" stroke-width="8"/>
  <circle cx="400" cy="300" r="60" fill="none" stroke="#e5e7eb" stroke-width="4"/>
  <path d="M 400 240 A 60 60 0 1 1 380 350" fill="none" stroke="#0066FF" stroke-width="6"/>
  <text x="400" y="290" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0066FF" text-anchor="middle">97.5%</text>
  <text x="400" y="310" font-family="Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">AI Accuracy</text>
  <text x="400" y="325" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Last 30 days</text>
  
  <!-- Prediction Models -->
  <rect x="60" y="180" width="250" height="200" fill="#ffffff" rx="12" stroke="#e5e7eb"/>
  <text x="80" y="210" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#374151">Active Models</text>
  
  <rect x="80" y="230" width="210" height="30" fill="#f0f9ff" rx="6"/>
  <text x="90" y="250" font-family="Arial, sans-serif" font-size="12" fill="#374151">Fraud Detection Model</text>
  <circle cx="270" cy="245" r="4" fill="#00FF88"/>
  
  <rect x="80" y="270" width="210" height="30" fill="#f0f9ff" rx="6"/>
  <text x="90" y="290" font-family="Arial, sans-serif" font-size="12" fill="#374151">Risk Assessment AI</text>
  <circle cx="270" cy="285" r="4" fill="#00FF88"/>
  
  <rect x="80" y="310" width="210" height="30" fill="#f0f9ff" rx="6"/>
  <text x="90" y="330" font-family="Arial, sans-serif" font-size="12" fill="#374151">Document Analyzer</text>
  <circle cx="270" cy="325" r="4" fill="#00FF88"/>
  
  <!-- Recent Predictions -->
  <rect x="490" y="180" width="270" height="200" fill="#ffffff" rx="12" stroke="#e5e7eb"/>
  <text x="510" y="210" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#374151">Recent Predictions</text>
  
  <rect x="510" y="230" width="230" height="25" fill="#ecfdf5" rx="4" stroke="#00FF88" stroke-width="1"/>
  <text x="520" y="247" font-family="Arial, sans-serif" font-size="11" fill="#374151">Claim ID: CL-2024-001</text>
  <text x="720" y="247" font-family="Arial, sans-serif" font-size="11" fill="#00FF88" text-anchor="end">APPROVE</text>
  
  <rect x="510" y="260" width="230" height="25" fill="#fef3c7" rx="4" stroke="#F59E0B" stroke-width="1"/>
  <text x="520" y="277" font-family="Arial, sans-serif" font-size="11" fill="#374151">Claim ID: CL-2024-002</text>
  <text x="720" y="277" font-family="Arial, sans-serif" font-size="11" fill="#F59E0B" text-anchor="end">REVIEW</text>
  
  <rect x="510" y="290" width="230" height="25" fill="#ecfdf5" rx="4" stroke="#00FF88" stroke-width="1"/>
  <text x="520" y="307" font-family="Arial, sans-serif" font-size="11" fill="#374151">Claim ID: CL-2024-003</text>
  <text x="720" y="307" font-family="Arial, sans-serif" font-size="11" fill="#00FF88" text-anchor="end">APPROVE</text>
  
  <rect x="510" y="320" width="230" height="25" fill="#fee2e2" rx="4" stroke="#EF4444" stroke-width="1"/>
  <text x="520" y="337" font-family="Arial, sans-serif" font-size="11" fill="#374151">Claim ID: CL-2024-004</text>
  <text x="720" y="337" font-family="Arial, sans-serif" font-size="11" fill="#EF4444" text-anchor="end">REJECT</text>
  
  <!-- Processing Stats -->
  <rect x="60" y="420" width="680" height="120" fill="#ffffff" rx="12" stroke="#e5e7eb"/>
  <text x="80" y="450" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#374151">Today's AI Performance</text>
  
  <text x="100" y="480" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0066FF">1,247</text>
  <text x="100" y="495" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Claims Analyzed</text>
  
  <text x="250" y="480" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#00FF88">2.3s</text>
  <text x="250" y="495" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Avg Processing</text>
  
  <text x="400" y="480" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#8B5CF6">98.1%</text>
  <text x="400" y="495" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Prediction Accuracy</text>
  
  <text x="550" y="480" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#F59E0B">₹4.2Cr</text>
  <text x="550" y="495" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Value Processed</text>
</svg>
